apiVersion: v1
kind: Namespace
metadata:
  name: sakura-gateway-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sakura-gateway-controller
  namespace: sakura-gateway-system
  labels:
    app: sakura-gateway-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sakura-gateway-controller
  template:
    metadata:
      labels:
        app: sakura-gateway-controller
    spec:
      serviceAccountName: sakura-gateway-controller
      terminationGracePeriodSeconds: 10
      containers:
        - name: manager
          image: localhost:32000/sakura-gateway-controller:dev
          imagePullPolicy: Always
          args:
            - --leader-elect
          env:
            - name: SAKURA_DRY_RUN
              value: "false"
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
