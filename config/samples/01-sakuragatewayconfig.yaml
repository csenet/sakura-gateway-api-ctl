# SakuraGatewayConfig - Sakura Cloud API Gateway configuration
apiVersion: gateway.sakura.io/v1alpha1
kind: SakuraGatewayConfig
metadata:
  name: default
spec:
  credentialsRef:
    name: sakura-api-credentials
    namespace: sakura-gateway-system
  subscription:
    planId: "plan-trial"
    name: "dev-subscription"
  gatewayVerification:
    enabled: true
    headerName: "X-Gateway-Secret"
